services:
  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vero2-chat-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_NAME=chat_db
      - REDIS_URL=redis://redis:6379
      - SSO_SERVICE_URL=http://sso-service:3001
      - SSO_PUBLIC_KEY=
      - SSO_ISSUER=http://sso-service:3001/sso
      - ORDER_SERVICE_URL=http://order-service:3003
      - USER_PROFILE_SERVICE_URL=http://user-profile-service:3005
      - ADMIN_SERVICE_URL=http://admin-service:3007
      - FILE_STORAGE_SERVICE_URL=http://host.docker.internal:3009
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=chat-service
      - KAFKA_GROUP_ID=chat-service-group
      - MAX_FILE_SIZE=1048576
      - ALLOWED_FILE_TYPES=pdf,image/*,audio/*,video/*
      - ORDER_CHAT_EXPIRATION_DAYS=7
      - AGENCY_CHAT_EXPIRATION_DAYS=7
      - LIVE_CHAT_OFFLINE_TIMEOUT_MINUTES=15
      - ADMIN_TIMEOUT_MINUTES=10
      - JWT_SECRET=change-me-jwt-secret
      - RATE_LIMIT_TTL=60
      - RATE_LIMIT_MAX=100
      - SKIP_JWT_VERIFICATION=true
      - SSO_PUBLIC_KEY=${SSO_PUBLIC_KEY}
      - SSO_ISSUER=http://localhost:3001/sso
    networks:
      - vero2-network
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/api/chat/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: vero2-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vero2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: vero2-chat-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - vero2-network

  redis:
    image: redis:7-alpine
    container_name: vero2-chat-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - vero2-network
    restart: unless-stopped

  file-storage-service:
    build:
      context: ../../apps/file-storage
      dockerfile: Dockerfile
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_NAME=vero2
      - MAX_UPLOAD_BYTES=10485760
      - ALLOWED_MIME_TYPES=image/*,audio/*,video/*,application/pdf,text/*
      - SKIP_JWT_VERIFICATION=true
    networks:
      - vero2-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/api/files/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  vero2-network:
    driver: bridge
