services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vero2-payment-service
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - PORT=3004
      - NODE_ENV=production
      - DB_HOST=vero2-postgres
      - DB_PORT=5432
      - DB_USERNAME=vero2_backend_app
      - DB_PASSWORD=pGYvP0e9W00UhAwYn6D1hDX6+3osOS170J5uqfSDXVzIcnYe1X/UOXN+OYlgDbt1
      - DB_NAME=vero2_backend
      - SSO_PUBLIC_KEY=-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----
      - SSO_ISSUER=http://localhost:3001/sso
      - RATE_LIMIT_TTL=60
      - RATE_LIMIT_MAX=100
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - ORDER_SERVICE_URL=http://order-service:3003/api/orders
      - ORDER_SERVICE_TIMEOUT=10000
      - WALLET_DEFAULT_CURRENCY=USD
    restart: unless-stopped
    networks:
      - vero2-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/api/payment/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  vero2-network:
    name: vero2new_vero2-network
    external: true

